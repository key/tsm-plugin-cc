name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate JSON (manifests + hooks)
        run: |
          fail=0
          while IFS= read -r f; do
            if ! jq empty "$f" 2>err; then
              echo "::error file=$f::invalid JSON: $(cat err)"
              fail=1
            fi
          done < <(find . -path ./.git -prune -o -name '*.json' -print)
          rm -f err
          exit "$fail"

      - name: Shellcheck hook scripts
        run: shellcheck $(find hooks/scripts -name '*.sh')

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Lint Markdown (rumdl)
        run: |
          pip install rumdl
          rumdl check .

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run hook tests
        run: bats test
