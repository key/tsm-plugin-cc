name: PR Title

# Enforce Conventional Commit types on PR titles. Releases are automated by
# release-please, and PRs are squash-merged, so the PR title becomes the
# commit subject that drives versioning and changelogs.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            chore
            ci
            test
            refactor
            build
            style
            revert
